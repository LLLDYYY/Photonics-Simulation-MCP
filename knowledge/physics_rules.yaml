physics:
  - id: PHY001
    topic: XCut_LN_Anisotropy
    tool:
      - Lumerical_FDE
    parameters:
      nx: 2.211
      ny: 2.138
      nz: 2.211
    notes:
      - TE_TM_classification_reversed
    detail: Z-normal FDE, Ey-dominant=TE(n_o), Ex-dominant=TM(n_e)

  - id: PHY002
    topic: Sidewall_Angle
    formula:
      - H1/tan(theta)
    incorrect_formula:
      - wt/2*tan(theta)
    example:
      H1_nm: 300
      theta_deg: 63
      offset_nm: 152.9

  - id: PHY003
    topic: SPP_Mode_Filter
    criteria:
      neff_real_gt: 0.5
      abs_imag_lt_real: true
    exclude:
      - spp_mode
    note: neff>2.3 modes in CPW electrode FDE are SPP (surface plasmon polariton), not physical guided modes

  - id: PHY004
    topic: FDE_Frequency
    recommendation:
      - c_const_over_lda0
    note: Default c_const/1[um] causes neff deviation; use c_const/lda0 (=1550nm)

  - id: PHY005
    topic: HFSS_Silicon_Conductivity
    observation:
      - conductivity_increases_nmw
      - conductivity_decreases_Z0
    note: Increasing sigma boosts n_mw via slow-wave effect but lowers Z0
    contradiction: Cannot optimize both n_mw and Z0 simultaneously via sigma alone
    literature:
      ref: Jian_2019
      sigma: 5000
      n_mw: 2.3
      Z0: 50
    sigma_scan:
      values:
        - sigma: 0
          n_mw: 1.975
        - sigma: 5000
          n_mw: 2.750
      note: Monotonic increase, saturates at sigma>=5000

  - id: PHY006
    topic: QuasiTEM_LowFrequency_Failure
    trigger:
      - low_frequency
    symptom:
      - abnormal_nmw
    example: n_mw=3.03@1GHz
    cause: Quasi-TEM assumption invalid at low frequencies; longitudinal field components non-negligible

  - id: PHY007
    topic: HFSS_3D_vs_COMSOL_2D
    observation:
      - 3d_and_2d_results_can_differ_20_percent
    example:
      HFSS_3D: n_mw=2.75
      COMSOL_2D: n_mw=2.29
      sigma: 5000
      deviation: "20%"
    reason:
      - different_physical_models
    detail: 3D HFSS has radiation boundary, field leaks to air -> lower epsilon_eff -> lower n_mw. 2D FEM strictly confines field in cross-section -> higher epsilon_eff.
    note: This is not a parsing error but inherent physical model difference

  - id: PHY008
    topic: Alpha_Attenuation_Unit_Conversion
    severity: critical
    incorrect:
      factor: 8685.89
      result: 637 dB/mm
    correct:
      formula: "Np/m * 8.68589 / 1000 = dB/mm"
      factor: 8.68589
      note: "Divide by 1000 for m->mm"
    verification:
      method: Cross-check with S21 magnitude
      example: "S21=-0.36dB@15GHz -> alpha≈0.42dB/mm"

  - id: PHY009
    topic: LN_Dual_Dielectric_Constants
    note: LiNbO3 has two distinct dielectric constant sets
    optical (@1550nm):
      n_o_squared: 4.571
      n_e_squared: 4.888
    microwave_static:
      eps_11: 43
      eps_22: 43
      eps_33: 28
    impact: Thin LN layer (600nm) contributes minimally to n_mw (filling factor q≈0.12); Si substrate (eps=11.7, q=0.5) dominates effective permittivity

  - id: PHY010
    topic: neff_vs_group_index_confusion
    severity: high
    note: Literature reporting n=2.29 may refer to GROUP refractive index n_g, not effective index n_eff
    formula: n_g = n_eff - lambda * dn_eff/d_lambda
    example:
      neff_mode13: 1.899
      ng_mode13: 2.379
      literature_value: 2.29
      incorrect_deviation: "17% (neff vs ng)"
      correct_deviation: "3.9% (ng vs ng)"
    warning: Never compare n_eff with n_g directly

  - id: PHY011
    topic: VpiL_Direct_Ex_Overlap
    note: VpiL can be computed directly using mode-weighted average electric field without explicit Gamma normalization
    formula: "VpiL_MIM = lambda / (4 * ne^3 * r33 * |<Ex>|)"
    overlap_integral: "<Ex> = integral(|E_opt|^2 * E_x_RF * dA) / integral(|E_opt|^2 * dA)"
    gamma_relation: "Gamma = <Ex> / (V_applied / gap)"
    note2: Direct <Ex> approach is simpler and avoids additional normalization errors

  - id: PHY012
    topic: Electrode_Polarity_No_Effect_On_VpiL
    note: Swapping Terminal and Ground positions reverses E_x sign but does not affect |<Ex>|, therefore VpiL is unchanged

  - id: PHY013
    topic: E_field_Range_Grid_Dependence
    note: Simulated E_x range depends on mesh density near electrode edges (field singularity)
    example:
      simulated_range: -90 to 5e5 V/m/V
      literature_range: 0 to 3e5 V/m/V
    causes:
      - negative values are numerical noise inside metal electrodes
      - higher peak from finer mesh at singularity points
      - literature may use electrode rounding or truncation
    recommendation: Set color scale to [0, 3e5] for comparison; does not affect VpiL calculation
